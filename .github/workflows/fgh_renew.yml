name: FGH-Renew-Auto
on:
  workflow_dispatch:
  schedule:
    # 每天按预定时间执行 (UTC时间)
    - cron: '30 2,6,10,14,18,22 * * *'

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      # 1. 跨仓库拉取私有库代码 (核心变更点)
      - name: 📥 拉取私库代码 (kanezikii/fgh_Renew)
        run: |
          # 使用 Secret 中的 Token 绕过权限拉取私有库
          git clone https://x-access-token:${{ secrets.PRIVATE_PAT }}@github.com/kanezikii/fgh_Renew.git private_repo
          # 将私有库中的 fgh_renew.py 复制到当前运行根目录
          cp private_repo/fgh_renew.py fgh_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool scrot unzip curl

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 部署并启动本地代理 (Xray)
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          # 下载并启动 Xray 代理以提供纯净的家宽/机房 IP
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip xray -d ./xray-bin
          chmod +x ./xray-bin/xray
          echo "$XRAY_CONFIG" > ./xray-bin/config.json
          nohup ./xray-bin/xray run -c ./xray-bin/config.json > xray.log 2>&1 &
          sleep 3

      - name: 🚀 执行核心自动化脚本
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          FGH_COOKIES: ${{ secrets.FGH_COOKIES }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          # 使用虚拟显示器运行刚刚从私库拉取过来的脚本
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python fgh_renew.py

      - name: 📸 上传运行截图 (便于排错)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
